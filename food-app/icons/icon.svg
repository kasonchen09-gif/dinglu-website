<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2d3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00c896"/>
      <stop offset="100%" stop-color="#00a87a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Plate/Bowl -->
  <ellipse cx="256" cy="260" rx="160" ry="120" fill="none" stroke="url(#accent)" stroke-width="12"/>
  <ellipse cx="256" cy="260" rx="120" ry="84" fill="rgba(0,200,150,0.1)" stroke="url(#accent)" stroke-width="6" stroke-dasharray="8 6"/>
  <!-- Fork & Knife -->
  <g transform="translate(145, 180)" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" fill="none">
    <line x1="0" y1="0" x2="0" y2="50"/>
    <line x1="0" y1="0" x2="25" y2="15"/>
    <line x1="0" y1="17" x2="25" y2="32"/>
    <line x1="0" y1="34" x2="25" y2="48"/>
  </g>
  <!-- Spoon -->
  <g transform="translate(345, 180)" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" fill="none">
    <line x1="0" y1="0" x2="0" y2="55"/>
  </g>
  <ellipse cx="345" cy="175" rx="18" ry="24" fill="rgba(0,200,150,0.3)" stroke="url(#accent)" stroke-width="8"/>
  <!-- Label -->
  <text x="256" y="420" font-family="'Noto Sans SC',sans-serif" font-size="36" font-weight="700" fill="url(#accent)" text-anchor="middle">食物扫描</text>
</svg>
