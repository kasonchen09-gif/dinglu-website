<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <!-- Gold Gradient -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0d878"/>
      <stop offset="50%" stop-color="#c49b4f"/>
      <stop offset="100%" stop-color="#a07830"/>
    </linearGradient>
    <!-- Icon Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Text Shadow for white text on dark -->
    <filter id="textGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="0" stdDeviation="1" flood-color="#c49b4f" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- ===== Icon: Abstract "信霖" Monogram ===== -->
  <g transform="translate(10, 5)">
    <!-- Outer Hexagon Ring (Tech Shield) -->
    <polygon points="45,2 88,27 88,73 45,98 2,73 2,27"
             fill="none" stroke="url(#goldGrad)" stroke-width="2.5"
             opacity="0.7"/>
    <!-- Inner Hexagon -->
    <polygon points="45,12 78,31 78,69 45,88 12,69 12,31"
             fill="rgba(196,155,79,0.1)" stroke="url(#goldGrad)" stroke-width="1"
             opacity="0.9"/>
    <!-- X-Shape: Stylized "信" radical + tech cross -->
    <g filter="url(#glow)">
      <!-- Vertical stroke -->
      <rect x="43" y="28" width="4" height="44" rx="2" fill="url(#goldGrad)"/>
      <!-- Horizontal crossbar -->
      <line x1="34" y1="50" x2="56" y2="50" stroke="url(#goldGrad)" stroke-width="3.5" stroke-linecap="round"/>
      <!-- Top horizontal accent -->
      <line x1="38" y1="36" x2="52" y2="36" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Bottom horizontal accent -->
      <line x1="38" y1="64" x2="52" y2="64" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Center dot -->
      <circle cx="45" cy="50" r="3" fill="#f0d878"/>
    </g>
    <!-- Outer tech ring -->
    <circle cx="45" cy="50" r="42" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.35" stroke-dasharray="8 4"/>
  </g>

  <!-- ===== Company Name (WHITE for dark nav) ===== -->
  <g transform="translate(110, 0)" filter="url(#textGlow)">
    <!-- Chinese Name -->
    <text x="0" y="40" font-family="'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif"
          font-size="28" font-weight="700" fill="#ffffff" letter-spacing="4">
      福州信霖管理咨询
    </text>
    <!-- English Subtitle -->
    <text x="0" y="65" font-family="'Playfair Display','Georgia',serif"
          font-size="12" font-weight="600" fill="#e2c06d" letter-spacing="5" opacity="0.9">
      FUZHOU XINLIN MANAGEMENT CONSULTING
    </text>
    <!-- Gold Divider -->
    <line x1="0" y1="72" x2="248" y2="72" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- ===== Bottom Tagline ===== -->
  <text x="110" y="90" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif"
        font-size="9" fill="#8899aa" letter-spacing="2">
    专业 · 高效 · 诚信 · 共赢
  </text>
</svg>
